<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 260px;
      padding: 16px;
      font-family: 'Segoe UI', 'Noto Sans KR', sans-serif;
      background: #1a1a1a;
      color: #e0e0e0;
      font-size: 13px;
    }
    h1 {
      font-size: 15px;
      font-weight: 600;
      margin-bottom: 12px;
      color: #fff;
    }
    .row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 8px 0;
      border-bottom: 1px solid rgba(255,255,255,0.06);
    }
    .row:last-child { border-bottom: none; }
    label { font-size: 12px; color: #aaa; }
    .toggle {
      position: relative;
      width: 36px;
      height: 20px;
    }
    .toggle input { display: none; }
    .toggle .slider {
      position: absolute;
      inset: 0;
      background: #333;
      border-radius: 10px;
      cursor: pointer;
      transition: 0.2s;
    }
    .toggle .slider::after {
      content: '';
      position: absolute;
      width: 16px;
      height: 16px;
      border-radius: 50%;
      background: #888;
      top: 2px;
      left: 2px;
      transition: 0.2s;
    }
    .toggle input:checked + .slider { background: #2563eb; }
    .toggle input:checked + .slider::after { transform: translateX(16px); background: #fff; }
    .info {
      margin-top: 12px;
      padding-top: 10px;
      border-top: 1px solid rgba(255,255,255,0.06);
      font-size: 11px;
      color: #666;
      text-align: center;
    }
  </style>
</head>
<body>
  <h1>YouTube Neat Chat</h1>
  <div class="row">
    <label>프로필 사진 표시</label>
    <div class="toggle">
      <input type="checkbox" id="showPhoto">
      <span class="slider"></span>
    </div>
  </div>
  <div class="row">
    <label>타임스탬프 표시</label>
    <div class="toggle">
      <input type="checkbox" id="showTimestamp">
      <span class="slider"></span>
    </div>
  </div>
  <div class="info">
    유튜브 라이브 페이지에서 채팅 오버레이가 자동으로 나타납니다.<br>
    오버레이는 드래그로 이동, 좌상단 모서리로 리사이즈할 수 있습니다.
  </div>
  <script src="popup.js"></script>
</body>
</html>
